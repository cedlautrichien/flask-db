openapi: 3.0.0
info:
  title: EU Transit Declaration Generator API
  description: This is a simple message generator for the European project NCTS (New Computerized Transit System) Phase 5.
  version: 1.0.0
servers:
  - url: http://localhost:8080
  - url: https://ncts5.monnier.cloud
tags:
- name : CC014C messages
  description: invalidation request from a trader

paths:
  /generic_xml:
    get:
      tags:
      - CC014C messages
      summary: Retrieve a generic example XML message in EU format
      parameters:
        - name: messageType
          in: query
          required: true
          schema:
            type: string
            example: "CC014C"
      responses:
        "200":
          description: Successful response
          content:
            application/xml:
              schema:
                type: string
  
  /austrian_xml:
    get:
      tags:
      - CC014C messages
      summary: Retrieve a dynamic XML message in Austrian format
      parameters:
        - name: messageType
          in: query
          required: true
          schema:
            type: string
            example: "CC014C"
        - name: MRN_LRN
          in: query
          required: true
          schema:
            type: string
            example: "MRN or LRN"
        - name: holderRIN
          in: query
          required: true
          schema:
            type: string
            example: "RIN of the Holder of Transit Procedure"
        - name: OoDep
          in: query
          required: true
          schema:
            type: string
            example: "Customs Office of Departure"
        - name: holderEORI
          in: query
          required: true
          schema:
            type: string
            example: "EORI Number of the Holder Of Transit Procedure"          
      responses:
        "200":
          description: Successful response
          content:
            application/xml:
              schema:
                type: string
  
  
